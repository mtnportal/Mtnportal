<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Wallet - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .wallet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .wallet-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .wallet-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .wallet-icon svg {
            width: 20px; height: 20px;
            color: var(--primary-yellow);
        }
        .wallet-header-text h2 {
            font-size: 16px; font-weight: 700;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .wallet-content {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }
        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            transition: transform 0.2s ease;
        }
        .info-card:active { transform: scale(0.98); }
        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--primary-yellow);
        }
        .btn-yellow-block {
            width: 100%;
            padding: 14px;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: block;
            transition: all 0.2s ease;
        }
        .btn-yellow-block:active { transform: scale(0.96); }
        .topup-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .topup-card h3 { color: #1a1a1a; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .amount-btn {
            padding: 14px; background: #f5f5f5;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            cursor: pointer; text-align: center;
            transition: all 0.2s ease;
        }
        .amount-btn:active { transform: scale(0.95); }
        .amount-btn.active { 
            border-color: var(--primary-yellow); 
            background: rgba(255,215,0,0.15); 
            color: #1a1a1a;
        }
        .custom-amount {
            width: 100%; padding: 14px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; margin-bottom: 8px;
            outline: none; color: #1a1a1a; background: #fafafa;
            -webkit-appearance: none;
        }
        .custom-amount:focus { border-color: var(--primary-yellow); background: #fff; }
        .custom-amount.error { border-color: #e74c3c; box-shadow: 0 0 0 3px rgba(231,76,60,0.15); }
        .amount-error {
            color: #e74c3c;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }
        .amount-error.show { display: block; }
        .btn-submit {
            width: 100%; padding: 16px; background: #1a1a1a;
            color: white; font-size: 16px; font-weight: 600;
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Transaction History */
        .history-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .history-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tx-item:last-child { border-bottom: none; }
        .tx-left { display: flex; flex-direction: column; gap: 2px; }
        .tx-type { font-size: 14px; font-weight: 600; }
        .tx-date { font-size: 11px; color: var(--text-muted); }
        .tx-amount { font-size: 14px; font-weight: 700; }
        .tx-credit { color: #4CAF50; }
        .tx-debit { color: #e74c3c; }
        
        @media (min-width: 768px) {
            .wallet-content { max-width: 520px; padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <header class="wallet-header">
        <a href="dashboard.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <div class="wallet-header-left">
            <div class="wallet-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                </svg>
            </div>
            <div class="wallet-header-text">
                <h2>Manage Wallet</h2>
            </div>
        </div>
        <div style="width: 60px;"></div>
    </header>

    <div class="wallet-content">
        <div class="info-card">
            <div class="info-label">Wallet Balance</div>
            <div class="info-value" id="walletBalance">GH₵ 0.00</div>
        </div>

        <div class="info-card">
            <div class="info-label">Amount Spent</div>
            <div class="info-value" id="amountSpent" style="font-size: 22px; color: var(--text-white);">GH₵ 0.00</div>
        </div>

        <div class="topup-card">
            <h3>Top Up Wallet</h3>
            <div class="amount-grid">
                <button class="amount-btn" onclick="selectAmount(15)">GH₵ 15</button>
                <button class="amount-btn" onclick="selectAmount(25)">GH₵ 25</button>
                <button class="amount-btn" onclick="selectAmount(50)">GH₵ 50</button>
                <button class="amount-btn" onclick="selectAmount(100)">GH₵ 100</button>
                <button class="amount-btn" onclick="selectAmount(200)">GH₵ 200</button>
                <button class="amount-btn" onclick="selectAmount(500)">GH₵ 500</button>
            </div>
            <input type="number" class="custom-amount" id="customAmount" placeholder="Or enter custom amount (GH₵)" oninput="clearSelection()">
            <p class="amount-error" id="amountError">Payment is from GH₵ 15 upwards</p>
            <button class="btn-submit" id="topupBtn" onclick="initiateTopUp()">Proceed to Payment</button>
        </div>

        <div class="history-card">
            <h3>Transaction History</h3>
            <div id="txHistory">
                <p style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">No transactions yet</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc, collection, query, where, orderBy, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcIww7vLwcx3dB0-5-OPg1sw1lcP-u4ZM",
            authDomain: "mtn-portal-671f6.firebaseapp.com",
            projectId: "mtn-portal-671f6",
            storageBucket: "mtn-portal-671f6.firebasestorage.app",
            messagingSenderId: "244083466572",
            appId: "1:244083466572:web:560219b082dddd6de56fe9",
            measurementId: "G-156B36671Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);

        let currentUser = null;
        let selectedAmount = 0;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }
            currentUser = user;

            // Get email from Firebase Auth (backend) - this is the source of truth
            const userEmail = user.email;
            if (!userEmail) {
                console.error('No email found for user');
                return;
            }

            // Also store in Firestore users collection for consistency
            const userRef = doc(db, 'users', user.uid);
            const userDoc = await getDoc(userRef);
            if (userDoc.exists() && !userDoc.data().email) {
                await updateDoc(userRef, { email: userEmail });
            }

            // Real-time wallet
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('walletBalance').textContent = 'GH₵ ' + (data.walletBalance || 0).toFixed(2);
                    document.getElementById('amountSpent').textContent = 'GH₵ ' + (data.amountSpent || 0).toFixed(2);
                }
            });

            // Transaction history
            const txQuery = query(
                collection(db, 'transactions'),
                where('userId', '==', user.uid),
                orderBy('createdAt', 'desc')
            );
            
            onSnapshot(txQuery, (snapshot) => {
                const container = document.getElementById('txHistory');
                if (snapshot.empty) {
                    container.innerHTML = '<p style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">No transactions yet</p>';
                    return;
                }
                
                let html = '';
                snapshot.forEach((doc) => {
                    const tx = doc.data();
                    const isCredit = tx.type === 'topup' || tx.type === 'credit';
                    const amountClass = isCredit ? 'tx-credit' : 'tx-debit';
                    const sign = isCredit ? '+' : '-';
                    const date = tx.createdAt ? new Date(tx.createdAt.toDate()).toLocaleDateString('en-GB') : 'Just now';
                    
                    html += `
                        <div class="tx-item">
                            <div class="tx-left">
                                <span class="tx-type">${tx.description || 'Transaction'}</span>
                                <span class="tx-date">${date}</span>
                            </div>
                            <span class="tx-amount ${amountClass}">${sign}GH₵ ${(tx.amount || 0).toFixed(2)}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        });

        window.selectAmount = function(amt) {
            selectedAmount = amt;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customAmount').value = amt;
            document.getElementById('amountError').classList.remove('show');
            document.getElementById('customAmount').classList.remove('error');
        };

        window.clearSelection = function() {
            selectedAmount = 0;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('amountError').classList.remove('show');
            document.getElementById('customAmount').classList.remove('error');
        };

        window.initiateTopUp = async function() {
            // Ensure user is authenticated and email is available
            if (!currentUser) {
                alert('Please wait... User session is loading.');
                return;
            }

            // Get email directly from Firebase Auth (backend source of truth)
            const userEmail = currentUser.email;
            if (!userEmail) {
                alert('Error: Unable to get your email. Please log out and log in again.');
                return;
            }

            const custom = parseFloat(document.getElementById('customAmount').value);
            const amount = selectedAmount || custom;
            const errorEl = document.getElementById('amountError');
            const inputEl = document.getElementById('customAmount');

            if (!amount || amount < 15) {
                errorEl.classList.add('show');
                inputEl.classList.add('error');
                return;
            }

            errorEl.classList.remove('show');
            inputEl.classList.remove('error');

            const reference = 'WALLET_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            try {
                const handler = PaystackPop.setup({
                    key: 'pk_live_1894c11558fa750a2bf2154b77326184381f3763',
                    email: userEmail, // Direct from Firebase Auth backend
                    amount: amount * 100,
                    currency: 'GHS',
                    ref: reference,
                    channels: ['mobile_money'],
                    metadata: {
                        custom_fields: [
                            { display_name: "Type", variable_name: "type", value: "wallet_topup" }
                        ]
                    },
                    callback: function(response) {
                        verifyPayment(response.reference, amount, 'wallet_topup');
                    },
                    onClose: function() {
                        alert('Payment was not completed.');
                    }
                });
                handler.openIframe();

            } catch (error) {
                alert('Payment error: ' + error.message);
            }
        };

        async function verifyPayment(reference, amount, type) {
            try {
                const verifyPaymentFn = httpsCallable(functions, 'verifyPaystackPayment');
                const result = await verifyPaymentFn({
                    reference: reference,
                    amount: amount,
                    type: type,
                    userId: currentUser.uid
                });

                if (result.data.success) {
                    // WALLET TOPUP: Add amount to wallet balance
                    if (type === 'wallet_topup') {
                        const userRef = doc(db, 'users', currentUser.uid);
                        await updateDoc(userRef, {
                            walletBalance: increment(amount)
                        });
                    }

                    // Record transaction for user history
                    await addDoc(collection(db, 'transactions'), {
                        userId: currentUser.uid,
                        type: type === 'wallet_topup' ? 'topup' : 'debit',
                        amount: amount,
                        description: type === 'wallet_topup' ? 'Wallet Top-up' : 'AFA Registration',
                        reference: reference,
                        paymentMethod: 'paystack',
                        status: 'completed',
                        createdAt: serverTimestamp()
                    });

                    // Record for admin backend
                    await addDoc(collection(db, 'admin_transactions'), {
                        userId: currentUser.uid,
                        userEmail: currentUser.email, // From Firebase Auth
                        type: type === 'wallet_topup' ? 'topup' : 'registration',
                        amount: amount,
                        description: type === 'wallet_topup' ? 'Wallet Top-up' : 'AFA Registration',
                        reference: reference,
                        paymentMethod: 'paystack',
                        status: 'completed',
                        createdAt: serverTimestamp()
                    });

                    alert(type === 'wallet_topup' 
                        ? 'Wallet topped up successfully! GH₵' + amount.toFixed(2) + ' added to your balance.' 
                        : 'Payment successful! Your registration is being processed.'
                    );
                } else {
                    alert('Payment verification failed. Please contact support.');
                }
            } catch (error) {
                alert('Verification error: ' + error.message);
            }
        }
    </script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</body>
</html>
