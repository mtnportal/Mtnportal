<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10,22,40,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .auth-header-left { display: flex; align-items: center; gap: 12px; }
        .auth-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .auth-icon svg { width: 20px; height: 20px; color: #FFD700; }
        .auth-header-text h2 { font-size: 16px; font-weight: 700; }
        .btn-yellow {
            background: #FFD700; color: #1a1a1a;
            font-size: 14px; font-weight: 600; padding: 10px 20px;
            border-radius: 50px; border: none; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
        .auth-content {
            padding: 24px 20px; max-width: 480px;
            margin: 0 auto;
        }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-card h3 { color: #1a1a1a; font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #1a1a1a; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .form-input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; font-family: inherit;
            color: #1a1a1a; background: #fafafa; outline: none;
        }
        .form-input:focus { border-color: #FFD700; background: #fff; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .form-input::placeholder { color: #aaa; }
        .form-input.error { border-color: #e74c3c; box-shadow: 0 0 0 3px rgba(231,76,60,0.15); }
        .error-msg { color: #e74c3c; font-size: 12px; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: 1.5px solid #ddd; border-radius: 8px;
            padding: 6px 12px; font-size: 13px; color: #666; cursor: pointer;
        }
        .btn-submit {
            width: 100%; padding: 16px; background: #1a1a1a;
            color: white; font-size: 16px; font-weight: 600;
            border: none; border-radius: 14px; cursor: pointer; margin-top: 8px;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .auth-link a { color: #1a1a1a; font-weight: 600; text-decoration: underline; }
        @media (min-width: 768px) {
            .auth-content { max-width: 520px; padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <div style="min-height: 100vh; display: flex; flex-direction: column;">
        <header class="auth-header">
            <div class="auth-header-left">
                <div class="auth-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <div class="auth-header-text">
                    <h2>MTN AFA Portal</h2>
                </div>
            </div>
            <a href="signin.html" class="btn-yellow">Login</a>
        </header>

        <div class="auth-content" style="flex: 1;">
            <div class="auth-card">
                <h3>Create Account</h3>
                <p class="subtitle">Register to manage your AFA activity, wallet, and orders.</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="e.g. John Doe">
                    <p class="error-msg" id="nameError">Please enter your full name.</p>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. johndoe">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="0240000000" maxlength="10">
                    <p class="error-msg" id="phoneError">Phone number must be exactly 10 digits.</p>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com">
                    <p class="error-msg" id="emailError">Please enter a valid email ending with .com</p>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="createPassword" class="form-input" placeholder="Minimum 6 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('createPassword', this)">Show</button>
                    </div>
                    <p class="error-msg" id="passwordError">Password must be at least 6 characters.</p>
                </div>

                <button class="btn-submit" id="createBtn" onclick="handleCreateAccount()">Create Account</button>

                <div class="auth-link">
                    Already have an account? <a href="signin.html">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcIww7vLwcx3dB0-5-OPg1sw1lcP-u4ZM",
            authDomain: "mtn-portal-671f6.firebaseapp.com",
            projectId: "mtn-portal-671f6",
            storageBucket: "mtn-portal-671f6.firebasestorage.app",
            messagingSenderId: "244083466572",
            appId: "1:244083466572:web:560219b082dddd6de56fe9",
            measurementId: "G-156B36671Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }
        window.togglePassword = togglePassword;

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.com$/;
            return re.test(email);
        }

        function validatePhone(phone) {
            return /^\d{10}$/.test(phone);
        }

        function showError(id, show) {
            const el = document.getElementById(id);
            const input = el.previousElementSibling;
            if (show) {
                el.classList.add('show');
                if (input && input.classList) input.classList.add('error');
            } else {
                el.classList.remove('show');
                if (input && input.classList) input.classList.remove('error');
            }
        }

        async function handleCreateAccount() {
            const name = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('createPassword').value;
            const btn = document.getElementById('createBtn');

            let hasError = false;

            if (!name) { showError('nameError', true); hasError = true; } else { showError('nameError', false); }
            if (!validatePhone(phone)) { showError('phoneError', true); hasError = true; } else { showError('phoneError', false); }
            if (!validateEmail(email)) { showError('emailError', true); hasError = true; } else { showError('emailError', false); }
            if (password.length < 6) { showError('passwordError', true); hasError = true; } else { showError('passwordError', false); }

            if (hasError) return;

            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await updateProfile(user, { displayName: name });

                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    username: username || '',
                    email: email,
                    phoneNumber: phone,
                    profilePicture: '',
                    selfiePicture: '',
                    ghanaCardFront: '',
                    ghanaCardBack: '',
                    walletBalance: 0,
                    amountSpent: 0,
                    totalRegistrations: 0,
                    registrationStatus: 'pending',
                    adminApproved: false,
                    createdAt: new Date().toISOString()
                });

                localStorage.setItem('userName', name);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userId', user.uid);
                localStorage.setItem('userPhone', phone);

                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
        window.handleCreateAccount = handleCreateAccount;
    </script>
</body>
</html>
